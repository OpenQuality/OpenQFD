<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#0D47A1"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8F00"/>
      <stop offset="100%" style="stop-color:#FFB300"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#0D47A1" stroke-width="4"/>
  <!-- House body -->
  <rect x="110" y="230" width="292" height="195" rx="6" fill="#FFFFFF" fill-opacity="0.95" stroke="#0D47A1" stroke-width="3"/>
  <!-- Roof triangle -->
  <polygon points="256,100 90,235 422,235" fill="url(#roof)" stroke="#E65100" stroke-width="3" stroke-linejoin="round"/>
  <!-- Grid lines (matrix inside) -->
  <line x1="110" y1="280" x2="402" y2="280" stroke="#BBDEFB" stroke-width="1.5"/>
  <line x1="110" y1="325" x2="402" y2="325" stroke="#BBDEFB" stroke-width="1.5"/>
  <line x1="110" y1="370" x2="402" y2="370" stroke="#BBDEFB" stroke-width="1.5"/>
  <line x1="185" y1="230" x2="185" y2="425" stroke="#BBDEFB" stroke-width="1.5"/>
  <line x1="258" y1="230" x2="258" y2="425" stroke="#BBDEFB" stroke-width="1.5"/>
  <line x1="331" y1="230" x2="331" y2="425" stroke="#BBDEFB" stroke-width="1.5"/>
  <!-- Colored relationship blocks -->
  <rect x="192" y="238" width="56" height="35" rx="3" fill="#D32F2F" opacity="0.9"/>
  <rect x="265" y="283" width="56" height="35" rx="3" fill="#1565C0" opacity="0.85"/>
  <rect x="338" y="238" width="56" height="35" rx="3" fill="#1565C0" opacity="0.85"/>
  <rect x="192" y="328" width="56" height="35" rx="3" fill="#757575" opacity="0.7"/>
  <rect x="338" y="373" width="56" height="35" rx="3" fill="#D32F2F" opacity="0.9"/>
  <rect x="265" y="373" width="56" height="35" rx="3" fill="#1565C0" opacity="0.85"/>
  <!-- Roof diamond cells -->
  <polygon points="222,190 242,210 222,230 202,210" fill="#0D47A1" opacity="0.7" stroke="#FFF" stroke-width="1"/>
  <polygon points="256,165 276,185 256,205 236,185" fill="#FF8F00" opacity="0.7" stroke="#FFF" stroke-width="1"/>
  <polygon points="290,190 310,210 290,230 270,210" fill="#0D47A1" opacity="0.7" stroke="#FFF" stroke-width="1"/>
  <!-- QFD text -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="48" font-weight="bold" fill="white" letter-spacing="8">QFD</text>
</svg>
